<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="warmHalo" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#FFD9C2" stop-opacity="0.85"></stop>
      <stop offset="60%" stop-color="#FFE6D6" stop-opacity="0.45"></stop>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"></stop>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"></feGaussianBlur>
      <feOffset dx="0" dy="2"></feOffset>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"></feFuncA></feComponentTransfer>
      <feMerge><feMergeNode></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="400" height="400" fill="url(#warmHalo)"></rect>

  <circle cx="200" cy="200" r="160" fill="none" stroke="#928D86" stroke-width="2.2"></circle>

  <circle cx="200" cy="200" r="138" fill="none" stroke="#928D86" stroke-width="1" stroke-dasharray="2 4" opacity="0.7"></circle>

  <g filter="url(#softShadow)">
    <image href="Estrategia_Color.png" x="130" y="130" width="140" height="140" preserveAspectRatio="xMidYMid meet"/>
  </g>
</svg>
