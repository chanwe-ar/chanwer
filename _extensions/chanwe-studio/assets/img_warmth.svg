<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 960 540" width="960" height="540" preserveAspectRatio="xMidYMid slice">
  <defs>
    
    <radialGradient id="warmWash" cx="50%" cy="20%" r="85%">
      <stop offset="0%" stop-color="#FFE3D6" stop-opacity="0.85"></stop>
      <stop offset="45%" stop-color="#FFD3BF" stop-opacity="0.45"></stop>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"></stop>
    </radialGradient>
    
    <linearGradient id="peachTint" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE9DC" stop-opacity="0.55"></stop>
      <stop offset="60%" stop-color="#FFFFFF" stop-opacity="0.05"></stop>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.35"></stop>
    </linearGradient>
    
    <radialGradient id="bottomFade" cx="50%" cy="100%" r="80%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0"></stop>
      <stop offset="80%" stop-color="#FFFFFF" stop-opacity="0.25"></stop>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.55"></stop>
    </radialGradient>
    <filter id="warmFilter" x="0" y="0" width="100%" height="100%">
      <feColorMatrix type="matrix" values="&#xA;        1.05 0    0    0 0.02&#xA;        0    1.0  0    0 0.01&#xA;        0    0    0.95 0 0&#xA;        0    0    0    1 0"></feColorMatrix>
    </filter>
  </defs>
  
  <image x="0" y="0" width="960" height="540" preserveAspectRatio="xMidYMid slice" filter="url(#warmFilter)"></image>
  
  <rect x="0" y="0" width="960" height="540" fill="url(#peachTint)"></rect>
  
  <rect x="0" y="0" width="960" height="540" fill="url(#warmWash)" style="mix-blend-mode:multiply"></rect>
  
  <rect x="0" y="0" width="960" height="540" fill="url(#bottomFade)"></rect>
</svg>