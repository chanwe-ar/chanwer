meta:
  name: ChanWe
  chart-palette-order:
    - brand-orange
    - p14-blue-strong
    - p14-cyan-strong
    - p14-green-strong
    - p14-yellow-strong
    - p14-magenta-strong
    - p14-red-strong
    - brand-gray

logo:
  small: assets/Logo_Negro.png
  medium: assets/Logo_Negro.png
  large: assets/Logo_Negro.png

color:
  palette:
    brand-orange: "#E94B2B"
    brand-black: "#101010"
    brand-white: "#F7F7F7"
    brand-pure-white: "#FFFFFF"
    brand-beige: "#F8F8F8"
    brand-beige-soft: "#EEEEEE"
    brand-gray: "#6B6B6B"
    brand-silver: "#C9C9C9"

    # Manual de marca page 13 secondary ramps
    p13-orange-01: "#E94B2B"
    p13-orange-02: "#EA5A3C"
    p13-orange-03: "#EC684E"
    p13-orange-04: "#ED775F"
    p13-orange-05: "#EF8670"
    p13-orange-06: "#F09482"
    p13-orange-07: "#F2A393"
    p13-orange-08: "#F5C0B6"
    p13-orange-09: "#F6CFC7"
    p13-orange-10: "#F8DDD9"
    p13-gray-01: "#101010"
    p13-gray-02: "#232323"
    p13-gray-03: "#353535"
    p13-gray-04: "#484848"
    p13-gray-05: "#5B5B5B"
    p13-gray-06: "#6D6D6D"
    p13-gray-07: "#929292"
    p13-gray-08: "#A5A5A5"
    p13-gray-09: "#B8B8B8"
    p13-gray-10: "#CACACA"

    # Manual de marca page 14 accents
    p14-yellow-strong: "#F9E710"
    p14-yellow-soft: "#FFF8B8"
    p14-cyan-strong: "#11F7E6"
    p14-cyan-soft: "#B6FFF8"
    p14-blue-strong: "#0C48ED"
    p14-blue-soft: "#B8CEFF"
    p14-magenta-strong: "#EB03F2"
    p14-magenta-soft: "#FDCFFF"
    p14-green-strong: "#1EB508"
    p14-green-soft: "#C9FFC0"
    p14-red-strong: "#F40C0C"
    p14-red-soft: "#F9A7A7"

  foreground: p13-gray-05
  background: brand-white
  primary: brand-orange
  secondary: brand-black
  success: p14-green-strong
  warning: p14-yellow-strong
  danger: p14-red-strong
  info: p14-cyan-strong

typography:
  fonts:
    - family: DM Sans
      source: file
      files:
        - path: assets/fonts/dm-sans/DMSans-Regular.ttf
          weight: 400
        - path: assets/fonts/dm-sans/DMSans-RegularItalic.ttf
          style: italic
          weight: 400
        - path: assets/fonts/dm-sans/DMSans-Medium.ttf
          weight: 500
        - path: assets/fonts/dm-sans/DMSans-MediumItalic.ttf
          style: italic
          weight: 500
        - path: assets/fonts/dm-sans/DMSans-SemiBold.ttf
          weight: 600
        - path: assets/fonts/dm-sans/DMSans-SemiBoldItalic.ttf
          style: italic
          weight: 600
        - path: assets/fonts/dm-sans/DMSans-Bold.ttf
          weight: 700
        - path: assets/fonts/dm-sans/DMSans-BoldItalic.ttf
          style: italic
          weight: 700
        - path: assets/fonts/dm-sans/DMSans-Black.ttf
          weight: 900
        - path: assets/fonts/dm-sans/DMSans-BlackItalic.ttf
          style: italic
          weight: 900

  base:
    family: DM Sans
    size: 13.5px
    line-height: 1.62

  headings:
    family: DM Sans
    weight: 900
    line-height: 1.15
    color: primary

  link:
    color: primary
    weight: 600

defaults:
  bootstrap:
    defaults:
      root-font-size: 91%
      body-line-height: 1.62
      border-radius: 0.22rem
      border-radius-sm: 0.16rem
      border-radius-lg: 0.3rem
      btn-font-weight: 600
      btn-border-radius: 0.22rem
      link-decoration: none
      link-hover-decoration: underline
      nav-link-font-weight: 600
      headings-font-weight: 700
      headings-font-family: "DM Sans"
      h1-font-size: 2.5rem
      h2-font-size: 2rem
      h3-font-size: 1.6rem

    rules: |
      :root {
        --chanwe-primary: #E94B2B;
        --chanwe-ink: #101010;
        --chanwe-paper: #FFFFFF;
        --chanwe-muted: #F8F8F8;

        --chanwe-yellow-strong: #F9E710;
        --chanwe-yellow-soft: #FFF8B8;
        --chanwe-cyan-strong: #11F7E6;
        --chanwe-cyan-soft: #B6FFF8;
        --chanwe-blue-strong: #0C48ED;
        --chanwe-blue-soft: #B8CEFF;
        --chanwe-magenta-strong: #EB03F2;
        --chanwe-magenta-soft: #FDCFFF;
        --chanwe-green-strong: #1EB508;
        --chanwe-green-soft: #C9FFC0;
        --chanwe-red-strong: #F40C0C;
        --chanwe-red-soft: #F9A7A7;
      }


      /* Title banner */
      .quarto-title-banner,
      .quarto-title-block .quarto-title-banner {
        background: #101010 !important;
        background-image: none !important;
        color: #FFFFFF !important;
        position: relative;
        overflow: hidden;
        min-height: 0;
        padding-top: 3.3rem;
        padding-bottom: 3.3rem;
      }

      .quarto-title-banner::after {
        content: "";
        position: absolute;
        right: clamp(1.1rem, 3vw, 2.6rem);
        top: 50%;
        bottom: auto;
        transform: translateY(-50%);
        width: min(4.8vw, 56px);
        height: min(62%, 150px);
        background-image:
          url("_extensions/chanwe-brand/assets/Estrategia_Color1.png"),
          url("_extensions/chanwe-brand/assets/MH_Color.png"),
          url("_extensions/chanwe-brand/assets/Tecno_Color.png");
        background-repeat: no-repeat;
        background-size: 42% auto, 42% auto, 42% auto;
        background-position: center 22%, center 50%, center 78%;
        opacity: 1;
        pointer-events: none;
        z-index: 1;
      }

      .quarto-title-banner .quarto-title,
      .quarto-title-block .quarto-title-meta,
      .quarto-title-banner .subtitle,
      .quarto-title-banner .title {
        text-align: center !important;
        position: relative;
        z-index: 2;
        color: #FFFFFF !important;
      }

      .quarto-title-block .quarto-title-meta {
        background: #101010;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: clamp(0.8rem, 2vw, 1.8rem);
        width: 100%;
        margin: 0;
        padding: 0.6rem 0 0;
        border: 0;
      }

      .quarto-title-block .quarto-title-meta-heading {
        display: none;
      }

      #title-block-header .keywords {
        display: none !important;
      }

      .quarto-title-block .quarto-title-meta-contents {
        padding-bottom: 0;
        font-size: 0.69rem;
        font-weight: 400;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        opacity: 0.9;
      }

      .quarto-title-banner .quarto-title {
        max-width: min(1760px, 95vw);
        margin-left: auto;
        margin-right: auto;
        margin-top: clamp(1rem, 1.7vw, 2rem);
        margin-bottom: clamp(1rem, 1.7vw, 2rem);
        border: none;
        border-radius: 0;
        padding: clamp(2.8rem, 4.4vw, 4.4rem) clamp(4.2rem, 10vw, 11rem);
      }

      .quarto-title-banner .quarto-title .chanwe-banner-bottom {
        margin-top: 0.9rem;
        margin-bottom: 0.8rem;
      }

      .quarto-title-banner .quarto-title .chanwe-keywords {
        margin-top: 0.85rem;
        padding-top: 1rem;
      }

      .quarto-title-banner .quarto-categories {
        display: flex;
        flex-wrap: wrap;
        justify-content: center !important;
        gap: 0.45rem;
        margin-top: 0.95rem;
        margin-bottom: 0.55rem;
      }

      .quarto-title-banner .quarto-title > .quarto-categories .quarto-category,
      .quarto-title-banner .quarto-categories.chanwe-top-pills .quarto-category {
        background: #E5E5E5 !important;
        color: #101010 !important;
        border: 0 !important;
        outline: none !important;
        box-shadow: none !important;
        opacity: 1 !important;
        border-radius: 0.4rem;
        font-size: 0.72rem;
        line-height: 1.2;
        font-weight: 400;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        padding: 0.24rem 0.65rem;
        text-decoration: none !important;
      }

      .quarto-title-banner .quarto-title > .quarto-categories .quarto-category:nth-child(1),
      .quarto-title-banner .quarto-categories.chanwe-top-pills .quarto-category:nth-child(1) {
        background: #e94b2b !important;
        color: #FFFFFF !important;
      }

      .quarto-title-banner .quarto-title > .quarto-categories .quarto-category:nth-child(2),
      .quarto-title-banner .quarto-categories.chanwe-top-pills .quarto-category:nth-child(2) {
        background: #E5E5E5 !important;
        color: #101010 !important;
      }

      .quarto-title-banner .quarto-title > .quarto-categories .quarto-category:hover,
      .quarto-title-banner .quarto-categories.chanwe-top-pills .quarto-category:hover {
        border: 0 !important;
        outline: none !important;
        box-shadow: none !important;
        filter: none !important;
        opacity: 1 !important;
      }

      .quarto-title-banner .quarto-title .chanwe-keyword-pills {
        display: flex;
        flex-wrap: wrap;
        justify-content: center !important;
        gap: 0.45rem;
        margin: 0;
      }

      .quarto-title-banner .quarto-title .chanwe-keyword-pills .quarto-category {
        background: transparent !important;
        color: #FFFFFF !important;
        border: 1px solid #FFFFFF !important;
        outline: none !important;
        box-shadow: none !important;
        opacity: 1 !important;
        border-radius: 0.4rem;
        font-size: 0.68rem;
        line-height: 1.2;
        font-weight: 400;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        padding: 0.2rem 0.62rem;
        text-decoration: none !important;
      }

      .quarto-title-banner .quarto-title .title::before {
        content: "";
        display: block;
        width: min(280px, 58vw);
        height: 68px;
        margin: 0 auto 1.5rem;
        background: url("_extensions/chanwe-brand/assets/Logo_Blanco.png") center / contain no-repeat;
      }

      .quarto-title-banner .subtitle {
        font-size: 0.94rem;
        font-weight: 200 !important;
        opacity: 0.88;
      }

      @media (max-width: 980px) {
        .quarto-title-banner {
          min-height: 0;
          padding-top: 2.35rem;
          padding-bottom: 2.35rem;
        }
        .quarto-title-banner::after {
          display: none;
        }
        .quarto-title-banner .quarto-title {
          max-width: 100%;
          margin-top: 0.65rem;
          margin-bottom: 0.65rem;
          padding: 2rem 1.75rem;
        }
        .quarto-title-banner .quarto-title .title::before {
          width: min(220px, 72vw);
          height: 54px;
          margin-bottom: 1.1rem;
        }
        .quarto-title-banner .subtitle {
          font-size: 0.88rem;
        }
        .quarto-title-banner .quarto-categories {
          margin-top: 0.75rem;
          margin-bottom: 0.4rem;
        }
        .quarto-title-banner .quarto-title > .quarto-categories .quarto-category,
        .quarto-title-banner .quarto-categories.chanwe-top-pills .quarto-category {
          font-size: 0.68rem;
          padding: 0.2rem 0.56rem;
        }
        .quarto-title-block .quarto-title-meta {
          flex-direction: column;
          gap: 0.45rem;
          margin: 0;
          padding: 0.5rem 0 0;
        }
        .quarto-title-block .quarto-title-meta-contents {
          padding-bottom: 0;
        }
        .quarto-title-banner .quarto-title .chanwe-keywords {
          margin-top: 0.7rem;
          padding-top: 0.85rem;
        }
        .quarto-title-banner .quarto-title .chanwe-banner-bottom {
          margin-top: 0.7rem;
          margin-bottom: 0.5rem;
        }
        .quarto-title-banner .quarto-title .chanwe-keyword-pills .quarto-category {
          font-size: 0.62rem;
          padding: 0.15rem 0.5rem;
        }
        main.content section#references,
        main.content #refs,
        main.content .references.csl-bib-body {
          padding-left: 0.9rem;
          padding-right: 0.9rem;
        }
        main.content section.footnotes,
        main.content #footnotes,
        main.content [role="doc-endnotes"] {
          padding-left: 1.1rem;
        }
      }

      /* Content links */
      main.content a:not(.nav-link):not(.anchorjs-link),
      main.content a.quarto-xref {
        color: #E94B2B;
      }

      h1, h2, h3, h4, h5, h6,
      .h1, .h2, .h3, .h4, .h5, .h6 {
        font-family: "DM Sans", sans-serif;
        font-weight: 700 !important;
      }

      /* Inline code */
      :not(pre) > code:not(.sourceCode),
      p code:not(.sourceCode),
      li code:not(.sourceCode),
      td code:not(.sourceCode) {
        background: #F8F8F8;
        color: #101010;
        border-radius: 0.2rem;
        padding: 0.08rem 0.32rem;
      }

      /* Callouts: distinct accents + white body */
      .callout.callout-note { border-left-color: var(--chanwe-cyan-strong) !important; }
      .callout.callout-note > .callout-header { background-color: var(--chanwe-cyan-soft) !important; color: #101010; }

      .callout.callout-info { border-left-color: var(--chanwe-cyan-strong) !important; }
      .callout.callout-info > .callout-header { background-color: var(--chanwe-cyan-soft) !important; color: #101010; }

      .callout.callout-tip,
      .callout.callout-success { border-left-color: var(--chanwe-green-strong) !important; }
      .callout.callout-tip > .callout-header,
      .callout.callout-success > .callout-header { background-color: var(--chanwe-green-soft) !important; color: #101010; }

      .callout.callout-warning { border-left-color: var(--chanwe-yellow-strong) !important; }
      .callout.callout-warning > .callout-header { background-color: var(--chanwe-yellow-soft) !important; color: #101010; }

      .callout.callout-important { border-left-color: var(--chanwe-magenta-strong) !important; }
      .callout.callout-important > .callout-header { background-color: var(--chanwe-magenta-soft) !important; color: #101010; }

      .callout.callout-caution,
      .callout.callout-alert { border-left-color: var(--chanwe-red-strong) !important; }
      .callout.callout-caution > .callout-header,
      .callout.callout-alert > .callout-header { background-color: var(--chanwe-red-soft) !important; color: #101010; }

      .callout .callout-body,
      .callout .callout-body-container {
        background-color: #FFFFFF !important;
        color: #5B5B5B !important;
        font-size: 0.94rem;
        line-height: 1.58;
      }
      .callout .callout-body {
        padding: 0 !important;
      }
      .callout .callout-body-container {
        padding: 0.82rem 1rem 0.95rem !important;
      }
      .callout > .callout-header {
        padding: 0.52rem 0.95rem !important;
      }
      .callout .callout-body-container p,
      .callout .callout-body-container li {
        color: #5B5B5B !important;
      }
      .callout .callout-body-container a {
        color: var(--chanwe-blue-strong) !important;
      }


      /* Bootstrap alert blocks aligned with the same palette */
      .alert-info { border-color: var(--chanwe-cyan-strong) !important; background-color: var(--chanwe-cyan-soft) !important; color: #101010 !important; }
      .alert-success { border-color: var(--chanwe-green-strong) !important; background-color: var(--chanwe-green-soft) !important; color: #101010 !important; }
      .alert-warning { border-color: var(--chanwe-yellow-strong) !important; background-color: var(--chanwe-yellow-soft) !important; color: #101010 !important; }
      .alert-danger { border-color: var(--chanwe-red-strong) !important; background-color: var(--chanwe-red-soft) !important; color: #101010 !important; }

      /* Premium editorial skin */
      body {
        background:
          radial-gradient(circle at 88% -10%, rgba(233, 75, 43, 0.14), transparent 32%),
          radial-gradient(circle at -8% 24%, rgba(12, 72, 237, 0.08), transparent 30%),
          linear-gradient(180deg, #FAFAFA 0%, #F3F3F3 100%);
        background-attachment: fixed;
      }


      .quarto-title-banner {
        border-bottom: 0;
      }

      .quarto-title-banner .quarto-title .title {
        letter-spacing: 0.01em;
        text-wrap: balance;
        font-weight: 700 !important;
      }

      .page-columns .content {
        background: rgba(255, 255, 255, 0.9);
        border: 1px solid rgba(16, 16, 16, 0.08);
        border-radius: 0.3rem;
        box-shadow:
          0 22px 50px rgba(16, 16, 16, 0.08),
          0 2px 8px rgba(16, 16, 16, 0.04);
        padding: clamp(2.2rem, 3vw, 3.8rem);
        backdrop-filter: blur(2px);
      }


      main.content .cell,
      main.content .quarto-figure,
      main.content .table-responsive,
      main.content .panel-tabset,
      main.content .callout {
        margin-top: 1.8rem;
        margin-bottom: 1.8rem;
      }

      main.content p {
        margin-bottom: 1.15rem;
      }

      main.content ul,
      main.content ol,
      main.content dl {
        margin-top: 0.65rem;
        margin-bottom: 1.3rem;
      }

      main.content h1,
      main.content h2,
      main.content h3,
      main.content h4 {
        color: #101010;
        letter-spacing: -0.01em;
        text-wrap: balance;
      }

      main.content h1 {
        margin-top: 1.65rem;
        margin-bottom: 1.25rem;
      }


      main.content h2,
      main.content h3 {
        margin-top: 2.6rem;
        margin-bottom: 0.95rem;
      }

      main.content h4,
      main.content h5,
      main.content h6 {
        margin-top: 2rem;
        margin-bottom: 0.7rem;
      }

      main.content section#references,
      main.content #refs,
      main.content .references.csl-bib-body {
        padding-left: clamp(1.25rem, 3.2vw, 3.4rem);
        padding-right: clamp(1.25rem, 3.2vw, 3.4rem);
      }

      main.content section.footnotes,
      main.content #footnotes,
      main.content [role="doc-endnotes"] {
        padding-left: clamp(1.5rem, 4vw, 4.2rem);
      }

      main.content h1::after {
        content: "";
        display: block;
        width: 58px;
        height: 1px;
        margin-top: 0.36rem;
        border-radius: 0.06rem;
        background: #6B6B6B;
      }

      main.content h1 .header-section-number,
      main.content h2 .header-section-number,
      main.content h3 .header-section-number,
      main.content h4 .header-section-number,
      main.content h5 .header-section-number,
      main.content h6 .header-section-number {
        color: #E94B2B !important;
        display: inline-block;
        margin-right: 0.14em;
      }

      main.content h1 .header-section-number::before,
      main.content h2 .header-section-number::before,
      main.content h3 .header-section-number::before,
      main.content h4 .header-section-number::before,
      main.content h5 .header-section-number::before,
      main.content h6 .header-section-number::before {
        content: "";
        display: inline-block;
        width: 0.46rem;
        height: 0.46rem;
        margin-right: 0.22rem;
        vertical-align: -0.08em;
        background: url("_extensions/chanwe-brand/assets/Estrategia_Color1.png") center / contain no-repeat;
      }

      nav[role="doc-toc"] {
        border: 1px solid rgba(16, 16, 16, 0.1);
        border-radius: 0.28rem;
        background: #FFFFFF;
        backdrop-filter: none;
        padding: 0.7rem 0.75rem;
      }

      nav[role="doc-toc"] .nav-link {
        border-left: 2px solid transparent;
        margin: 0.1rem 0;
        border-radius: 0.16rem;
        padding: 0.18rem 0.4rem;
        font-size: 0.88rem;
        line-height: 1.25;
      }

      nav[role="doc-toc"] ul {
        padding-left: 0;
        margin-left: 0;
        list-style: none;
      }

      nav[role="doc-toc"] ul ul {
        display: none;
      }

      nav[role="doc-toc"] .header-section-number {
        color: #E94B2B !important;
        font-weight: 700;
      }

      nav[role="doc-toc"] .nav-link:hover {
        background: transparent;
        color: #101010;
      }

      nav[role="doc-toc"] .nav-link.active {
        border-left-color: #E94B2B;
        background: transparent;
        font-weight: 700;
      }


      pre,
      pre.sourceCode,
      div.sourceCode pre {
        background-color: #F7F7F7 !important;
        border-left: 4px solid #E94B2B !important;
        border-radius: 0.26rem !important;
        box-shadow: none;
      }


      table {
        border-collapse: separate;
        border-spacing: 0;
        overflow: hidden;
        border-radius: 0.24rem;
      }

      table thead th {
        background: #101010;
        color: #FFFFFF;
        border-color: rgba(255, 255, 255, 0.08) !important;
      }

      table tbody tr:nth-child(even) {
        background: transparent !important;
      }

      .table-striped > tbody > tr:nth-of-type(odd) > *,
      .table-striped > tbody > tr:nth-of-type(even) > * {
        background-color: #FFFFFF !important;
      }


      blockquote {
        border-left: 4px solid #E94B2B;
        background: rgba(233, 75, 43, 0.06);
        border-radius: 0 0.24rem 0.24rem 0;
      }


      .panel-tabset > .nav-tabs {
        border-bottom: 1px solid rgba(16, 16, 16, 0.14);
      }

      .panel-tabset > .nav-tabs .nav-link {
        border: 0;
        border-bottom: 3px solid transparent;
        font-weight: 700;
        color: #6B6B6B;
        padding-left: 0.4rem;
        padding-right: 0.4rem;
      }

      .panel-tabset > .nav-tabs .nav-link:hover {
        color: #101010;
        background: rgba(233, 75, 43, 0.08);
      }

      .panel-tabset > .nav-tabs .nav-link.active {
        color: #101010;
        border-bottom-color: #E94B2B;
        background: transparent;
      }


      img,
      .quarto-figure img {
        border-radius: 0.24rem;
        box-shadow: none;
      }


      .quarto-figure figcaption,
      .figure-caption,
      .panel-caption,
      table caption {
        color: #7C7C7C;
        font-size: 0.86rem;
        font-weight: 500;
      }


      @media (max-width: 980px) {
        .page-columns .content {
          border-radius: 0.24rem;
          padding: 1.55rem;
        }
      }

      @media (min-width: 992px) {
        body:not(.floating):not(.docked) .page-columns {
          grid-template-columns:
            [screen-start] 1.5em
            [screen-start-inset] 4fr
            [page-start page-start-inset] 30px
            [body-start-outset] 30px
            [body-start] 2rem
            [body-content-start] minmax(680px, calc(1100px - 4rem))
            [body-content-end] 2rem
            [body-end] 30px
            [body-end-outset] minmax(120px, 240px)
            [page-end-inset] 30px
            [page-end] 4fr
            [screen-end-inset] 1.5em
            [screen-end];
        }
      }

      /* Document footer */
      body::after {
        content: "www.chanwe.ar";
        display: flex;
        align-items: center;
        justify-content: center;
        height: 148px;
        margin: clamp(2.6rem, 3.2vw, 3.8rem) 0 clamp(1.1rem, 1.8vw, 1.8rem);
        padding: 0 1rem;
        box-sizing: border-box;
        text-align: center;
        color: #FFFFFF;
        font-size: 0.98rem;
        font-weight: 300;
        line-height: 1.2;
        letter-spacing: 0.01em;
        background-color: #101010;
        background-image:
          url("_extensions/chanwe-brand/assets/Logo_Blanco.png"),
          url("_extensions/chanwe-brand/assets/Iconos_Beige.png");
        background-repeat: no-repeat, no-repeat;
        background-size: 136px auto, 124px auto;
        background-position: left clamp(1rem, 2.8vw, 2.4rem) center, right 1rem center;
      }

      @media (max-width: 980px) {
        body::after {
          height: 126px;
          margin: 2.1rem 0 1rem;
          padding: 0 0.8rem;
          font-size: 0.9rem;
          background-size: 102px auto, 92px auto;
          background-position: left 0.8rem center, right 0.6rem center;
        }
      }

